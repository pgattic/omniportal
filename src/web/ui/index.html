<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OmniPortal</title>
<style>
:root{color-scheme:light dark;--bg:light-dark(#eef1f5,#0d1117);--panel:light-dark(#ffffff,#151b23);--surface:light-dark(#f7f9fb,#1d2630);--field:light-dark(#ffffff,#10161d);--line:light-dark(#d9e0e8,#2d3743);--soft-line:light-dark(#e7ecf1,#242e39);--muted:light-dark(#5f6c7b,#a7b3c2);--text:light-dark(#111827,#edf2f7);--control:light-dark(#f1f5f9,#202a35);--accent:light-dark(#0b67b2,#65a9ee);--accent-fill:light-dark(#0b67b2,#2380df);--danger:light-dark(#b42318,#f06455);--danger-fill:light-dark(#b42318,#9f2b22);--ok:light-dark(#087847,#76d5aa);--ok-bg:light-dark(#eaf8f1,#10251d);--warn:light-dark(#8a4b00,#f0bd63);--warn-bg:light-dark(#fff6df,#2a2114);--shadow:light-dark(0 12px 32px rgba(15,23,42,.08),0 12px 32px rgba(0,0,0,.25));--log-bg:light-dark(#101820,#05080c);--log-text:light-dark(#f4f8fb,#dce7f2)}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
main{max-width:1040px;margin:0 auto;padding:14px}
header{position:sticky;top:0;z-index:2;padding:14px;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--soft-line)}
.topbar{max-width:1040px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
h1{font-size:25px;line-height:1.05;margin:0}
h2{font-size:18px;margin:0}
h3{font-size:15px;margin:0}
button,input,select{font:inherit;min-width:0;max-width:100%;border:1px solid var(--line);border-radius:8px;background:var(--field);color:var(--text)}
button{padding:9px 12px;background:var(--control);cursor:pointer;font-weight:700}
button:disabled{opacity:.52;cursor:not-allowed}
button.primary{background:var(--accent-fill);border-color:var(--accent-fill);color:#fff}
button.danger{background:var(--danger-fill);border-color:var(--danger-fill);color:#fff}
button.ghost{background:transparent}
.icon{width:18px;height:18px;display:block;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.icon-button{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;flex:0 0 40px}
.icon-button.primary,.icon-button.danger{color:#fff}
input,select{width:100%;padding:10px 11px}
label{display:grid;gap:5px;font-size:12px;margin:8px 0;font-weight:800;color:var(--muted);text-transform:uppercase}
a{color:var(--accent);font-weight:800;text-decoration:none}
.mode-pill{justify-self:end;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.mode-pill select{width:auto;min-width:165px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 14px}
.tabs button{border-radius:999px;background:var(--panel)}
.tabs button.active{background:var(--accent-fill);border-color:var(--accent-fill);color:#fff}
.tab{display:none}
.tab.active{display:grid;gap:14px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:var(--shadow);display:grid;gap:12px}
.hero{display:grid;gap:14px;border-color:color-mix(in srgb,var(--accent) 45%,var(--line));background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 10%,var(--panel)),var(--panel))}
.hero-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;min-width:0}
.hero-title{display:grid;gap:4px}
.subtitle,.meta{font-size:13px;color:var(--muted);overflow-wrap:anywhere}
.status-strip{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;background:var(--surface)}
.pill.ok{color:var(--ok);background:var(--ok-bg);border-color:color-mix(in srgb,var(--ok) 40%,var(--line))}
.pill.warn{color:var(--warn);background:var(--warn-bg);border-color:color-mix(in srgb,var(--warn) 40%,var(--line))}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:end;min-width:0}
.row>*{flex:1 1 180px;min-width:0}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-width:0}
.actions button,.actions a{flex:0 1 auto}
.actions a{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:8px;background:var(--control);padding:9px 12px}
.actions .icon-button{flex:0 0 40px;padding:0}
.portal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.portal-card,.item-card{border:1px solid var(--line);border-radius:10px;background:var(--surface);padding:12px;display:grid;gap:9px;min-width:0}
.portal-card.active{border-color:color-mix(in srgb,var(--accent) 52%,var(--line));background:color-mix(in srgb,var(--accent) 7%,var(--surface))}
.theme-card{border-left:4px solid var(--theme-color,var(--line))}
.portal-card.active.theme-card{border-left-color:var(--theme-color,var(--accent));background:linear-gradient(90deg,color-mix(in srgb,var(--theme-color,var(--accent)) 11%,var(--surface)),var(--surface) 42%)}
.portal-name,.item-name{font-weight:900;overflow-wrap:anywhere}
.portal-add{border-style:dashed;align-content:center;min-height:104px}
.portal-add button{font-size:22px;line-height:1;padding:10px 15px;border-radius:999px}
.portal-add .icon-button{width:40px;height:40px;padding:0}
.list{display:grid;gap:9px}
.item-head{display:flex;justify-content:space-between;gap:10px;align-items:start;min-width:0}
.item-head>div{min-width:0}
.item-meta{font-size:12px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;min-width:0}
.theme-pill{display:inline-flex;align-items:center;border:1px solid color-mix(in srgb,var(--theme-color,var(--accent)) 42%,var(--line));border-radius:999px;padding:2px 7px;color:var(--theme-color,var(--accent));background:color-mix(in srgb,var(--theme-color,var(--accent)) 10%,var(--surface));font-weight:900}
.empty{padding:16px;border:1px dashed var(--line);border-radius:10px;color:var(--muted);background:var(--surface);text-align:center}
.split{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}
.catalog-actions{display:grid;grid-template-columns:1fr auto;align-items:end}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.status-cell{border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--surface)}
.status-label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900}
.status-value{margin-top:3px;font-weight:900;word-break:break-word}
#message{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:var(--log-bg);color:var(--log-text);padding:11px;border-radius:8px;min-height:74px;max-height:190px;overflow:auto}
@media(max-width:760px){
  main{padding:10px}
  header{padding:12px}
  .topbar{grid-template-columns:1fr}
  .mode-pill{display:grid;grid-template-columns:1fr 1fr;justify-self:stretch}
  .mode-pill select{grid-column:1/-1;width:100%;min-width:0}
  .mode-pill button{width:100%}
  .mode-pill .icon-button{width:100%}
  .row{display:grid;gap:12px}
  .row>*{min-width:0}
  .split{grid-template-columns:1fr}
  .tabs{position:sticky;top:75px;z-index:1}
  .portal-grid{grid-template-columns:1fr}
  .catalog-actions{grid-template-columns:1fr}
  .actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:8px}
  .actions button,.actions a{width:100%;text-align:center}
  .item-card .actions,.portal-card .actions{display:flex}
  .item-card .actions .icon-button,.portal-card .actions .icon-button{width:40px}
}
</style>
</head>
<body>
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
<symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.3 6.4"/><path d="M3 12A9 9 0 0 1 18.3 5.6"/><path d="M20 2v6h-6"/><path d="M4 22v-6h6"/></symbol>
<symbol id="icon-x" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
<symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></symbol>
<symbol id="icon-minus" viewBox="0 0 24 24"><path d="M5 12h14"/></symbol>
<symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
<symbol id="icon-edit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></symbol>
<symbol id="icon-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></symbol>
<symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></symbol>
</svg>
<header>
<div class="topbar">
<div>
<h1>OmniPortal</h1>
<div class="subtitle" id="subtitle">Loading device state...</div>
</div>
<div class="mode-pill">
<select id="modeSelect">
<option value="skylanders">Skylanders</option>
<option value="infinity">Disney Infinity</option>
</select>
<button onclick="switchMode()">Save</button>
<button class="ghost icon-button" title="Refresh" aria-label="Refresh" onclick="refreshAll()"><svg class="icon" aria-hidden="true"><use href="#icon-refresh"></use></svg></button>
</div>
</div>
</header>
<main>
<nav class="tabs" aria-label="Main sections">
<button id="tabButtonPlay" class="active" onclick="showTab('play')">Play</button>
<button id="tabButtonAdd" onclick="showTab('add')">Add</button>
<button id="tabButtonSettings" onclick="showTab('settings')">Settings</button>
</nav>

<section id="tabPlay" class="tab active">
<div class="panel hero">
<div class="hero-head">
<h2 id="deviceHeading">Device</h2>
<button id="clearDeviceButton" class="icon-button" title="Clear" aria-label="Clear" onclick="clearActive()"><svg class="icon" aria-hidden="true"><use href="#icon-x"></use></svg></button>
</div>
<div id="slots" class="portal-grid"></div>
</div>

<div class="panel">
<div class="hero-head">
<h2>Collection</h2>
<span class="pill" id="collectionScope">Current game</span>
</div>
<div class="row">
<label>Search<input id="collectionSearch" placeholder="Search collection"></label>
</div>
<div id="entities" class="list"></div>
</div>
</section>

<section id="tabAdd" class="tab">
<div class="split">
<div class="panel">
<h2>Create Toy</h2>
<form id="entityForm">
<div class="row">
<label>Game<select name="game" id="catalogGame">
<option value="skylanders">Skylanders</option>
<option value="infinity">Disney Infinity</option>
</select></label>
<label>Type<select id="catalogKind"></select></label>
</div>
<label>Search<input id="catalogSearch" placeholder="Filter toys"></label>
<label>Toy<select name="catalog_index" id="catalogSelect"></select></label>
<div class="meta" id="catalogCount"></div>
<label>Nickname<input name="name" id="catalogName" placeholder="Defaults to selected toy"></label>
<div class="catalog-actions">
<button class="primary" type="submit">Add to Collection</button>
</div>
</form>
</div>

<div class="panel">
<h2>Import Backup</h2>
<form id="uploadEntityForm">
<label>Game<select name="game">
<option value="skylanders">Skylanders</option>
<option value="infinity">Disney Infinity</option>
</select></label>
<label>Nickname<input name="name" required placeholder="Imported toy name"></label>
<label>Binary File<input name="file" type="file" required></label>
<button class="primary" type="submit">Import</button>
</form>
</div>
</div>
</section>

<section id="tabSettings" class="tab">
<div class="panel">
<h2>Status</h2>
<div id="status" class="settings-grid">Loading...</div>
</div>
<div class="panel">
<h2>Maintenance</h2>
<div class="actions">
<button onclick="compactStorage()">Compact Storage</button>
</div>
</div>
<div class="panel">
<h2>Log</h2>
<div id="message">Ready.</div>
</div>
</section>
</main>

<script>
let library = {identities:[],entities:[],active_entity_id:null,active_slots:[]};
let catalog = [];
let catalogTotal = 0;
let catalogTimer = 0;
let collectionTimer = 0;
let currentMode = "skylanders";
let activeTab = "play";
let refreshing = false;
const skylandersPortalSlotCount = 8;
const catalogKinds = {
  skylanders: [
    ["", "All types"],
    ["character", "Characters"],
    ["item", "Magic items"],
    ["level-piece", "Level pieces"],
    ["trap", "Traps"],
    ["vehicle", "Vehicles"],
    ["creation-crystal", "Creation crystals"],
    ["trophy", "Trophies"]
  ],
  infinity: [
    ["", "All types"],
    ["character", "Characters"],
    ["power-disc", "Power discs"],
    ["play-set", "Play sets"],
    ["unknown", "Other"]
  ]
};
const infinityPortalSlots = [
  {slot:0,label:"Player 1",accepts:item=>item.game==="infinity"&&(item.kind==="character"||item.kind==="unknown")},
  {slot:1,label:"Player 2",accepts:item=>item.game==="infinity"&&(item.kind==="character"||item.kind==="unknown")},
  {slot:2,label:"Item / Disc",accepts:item=>item.game==="infinity"&&item.kind!=="character"&&item.kind!=="unknown"}
];

const $ = id => document.getElementById(id);
const enc = value => encodeURIComponent(value == null ? "" : value);
const qs = form => new URLSearchParams(new FormData(form)).toString();

async function api(path, options) {
  let res;
  try {
    res = await fetch(path, options);
  } catch (_) {
    throw new Error("Device did not respond. Check that you are connected to the OmniPortal WiFi network.");
  }
  const text = await res.text();
  if (!res.ok) throw new Error(text.trim() || res.statusText);
  try { return JSON.parse(text); } catch (_) { return text; }
}

function say(value) {
  $("message").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
}

function showTab(tab) {
  activeTab = tab;
  for (const name of ["play","add","settings"]) {
    $(`tab${capitalize(name)}`).classList.toggle("active", name === tab);
    $(`tabButton${capitalize(name)}`).classList.toggle("active", name === tab);
  }
  if (tab === "add" && catalog.length === 0) loadCatalog().catch(error => say(error.message));
}

function capitalize(value) {
  return value.slice(0, 1).toUpperCase() + value.slice(1);
}

async function refreshAll() {
  if (refreshing) return;
  refreshing = true;
  try {
    const status = await api("/status");
    library = await api("/api/library");
    renderStatus(status);
    renderLibrary();
  } catch (error) {
    $("subtitle").textContent = "Disconnected";
    $("status").innerHTML = `<span class="pill warn">Offline</span>`;
    say(error.message);
    return;
  } finally {
    refreshing = false;
  }

  if (activeTab === "add") {
    try {
      await loadCatalog();
    } catch (error) {
      catalog = [];
      catalogTotal = 0;
      renderCatalog();
      say(`Catalog refresh failed: ${error.message}`);
    }
  }
}

function renderStatus(status) {
  currentMode = status.mode || "skylanders";
  $("modeSelect").value = currentMode;
  $("catalogGame").value = currentMode;
  $("uploadEntityForm").elements.game.value = currentMode;
  updateCatalogKindOptions();
  renderDeviceLabels();

  const storage = status.storage || {};
  const slots = activeSlotsForCurrentMode(status.active_slots || []);
  const used = storage.used_bytes || 0;
  const capacity = storage.capacity_bytes || 0;
  const mode = displayMode(currentMode);
  const storageText = `${storagePercent(used, capacity)} used`;

  $("subtitle").textContent = `${mode} / ${deviceName()} / ${storageText}`;
  $("status").innerHTML =
    statusCell("Mode", mode) +
    statusCell(`On ${deviceName()}`, String(slots.length)) +
    statusCell("Collection", `${storage.entities || 0} entities`) +
    statusCell("Storage", `${used} / ${capacity} bytes (${storagePercent(used, capacity)})`) +
    statusCell("Integrity", storage.corrupt_records ? `${storage.corrupt_records} corrupt` : "OK");
}

function deviceName(mode = currentMode) {
  return mode === "infinity" ? "Base" : "Portal of Power";
}

function displayMode(mode) {
  if (mode === "infinity") return "Disney Infinity";
  if (mode === "skylanders") return "Skylanders";
  return mode || "Unknown";
}

function renderDeviceLabels() {
  $("deviceHeading").textContent = deviceName();
  $("collectionScope").textContent = displayMode(currentMode);
}

function statusCell(label, value) {
  return `<div class="status-cell"><div class="status-label">${escapeHtml(label)}</div><div class="status-value">${escapeHtml(value)}</div></div>`;
}

function icon(name) {
  return `<svg class="icon" aria-hidden="true"><use href="#icon-${name}"></use></svg>`;
}

function iconButton(label, iconName, onclick, classes = "") {
  const className = `icon-button${classes ? ` ${classes}` : ""}`;
  return `<button class="${className}" type="button" title="${escapeHtml(label)}" aria-label="${escapeHtml(label)}" onclick="${onclick}">${icon(iconName)}</button>`;
}

function iconLink(label, iconName, href) {
  return `<a class="icon-button" title="${escapeHtml(label)}" aria-label="${escapeHtml(label)}" href="${href}">${icon(iconName)}</a>`;
}

async function switchMode() {
  const mode = $("modeSelect").value;
  try {
    const result = await api("/api/mode/set", {method:"POST", body:`mode=${enc(mode)}`});
    say(result.reenumerating
      ? `${displayMode(result.mode)} mode saved. Restart the console game if it does not notice the device.`
      : `${displayMode(result.mode)} mode is already active.`);
    await refreshAll();
  } catch (error) {
    say(error.message);
  }
}

async function loadCatalog() {
  const game = $("catalogGame").value;
  const kind = $("catalogKind").value;
  const search = $("catalogSearch").value.trim();
  const loaded = await api(`/api/catalog?game=${enc(game)}&kind=${enc(kind)}&q=${enc(search)}&limit=30`);
  catalog = loaded.toys || [];
  catalogTotal = loaded.total || catalog.length;
  renderCatalog();
}

function renderCatalog() {
  const select = $("catalogSelect");
  const selected = select.value;
  select.innerHTML = catalog.map(item =>
    `<option value="${item.index}">${escapeHtml(item.name)} (${escapeHtml(catalogOptionMeta(item))})</option>`
  ).join("");
  if (catalog.some(item => String(item.index) === selected)) select.value = selected;
  select.disabled = catalog.length === 0;
  $("entityForm").querySelector("button[type=submit]").disabled = catalog.length === 0;
  $("catalogCount").textContent = catalog.length
    ? `${catalogTotal} matching toys${catalogTotal > catalog.length ? `; showing first ${catalog.length}` : ""}.`
    : "No matching catalog toys.";
  updateCatalogNicknameHint();
}

function catalogOptionMeta(item) {
  const details = [];
  if (item.theme_label && item.theme_label !== "Unknown") details.push(item.theme_label);
  details.push(readableKind(item.kind));
  if (item.series && item.series !== item.theme_label) details.push(item.series);
  return details.join(", ");
}

function updateCatalogKindOptions() {
  const game = $("catalogGame").value;
  const selected = $("catalogKind").value;
  const options = catalogKinds[game] || catalogKinds.skylanders;
  $("catalogKind").innerHTML = options
    .map(([value, label]) => `<option value="${value}">${label}</option>`)
    .join("");
  if (options.some(([value]) => value === selected)) $("catalogKind").value = selected;
}

function selectedCatalogToy() {
  const index = Number($("catalogSelect").value);
  return catalog.find(item => item.index === index) || null;
}

function suggestedNickname(toy) {
  if (!toy) return "";
  const existing = (library.entities || []).filter(item =>
    item.game === $("catalogGame").value &&
    (Number(item.catalog_index) === Number(toy.index) || item.figure === toy.name || item.toy === toy.name)
  ).length;
  return existing ? `${toy.name} ${existing + 1}` : toy.name;
}

function updateCatalogNicknameHint() {
  const name = suggestedNickname(selectedCatalogToy());
  $("catalogName").placeholder = name || "Defaults to selected toy";
}

function renderLibrary() {
  renderSlots();
  renderEntities();
}

function currentGameEntities() {
  const search = $("collectionSearch").value.trim();
  return [...(library.entities || [])]
    .filter(item => item.game === currentMode)
    .filter(item => !search || containsText(item.name, search) || containsText(item.figure || "", search))
    .sort((left, right) => left.name.localeCompare(right.name));
}

function activeSlotsForCurrentMode(slots = library.active_slots || []) {
  const entities = library.entities || [];
  return slots.filter(slot => {
    const entity = entities.find(item => item.id === slot.entity_id);
    return entity && entity.game === currentMode;
  });
}

function renderEntities() {
  const entities = currentGameEntities();
  const activeSlots = activeSlotsForCurrentMode();
  $("entities").innerHTML = entities.map(item => {
    const slots = activeSlots.filter(slot => slot.entity_id === item.id).map(slot => Number(slot.slot));
    const active = slots.length ? `<span class="pill ok">Active</span>` : "";
    const placeOrRemove = slots.length
      ? slots.map(slot => iconButton("Remove", "minus", `removeSlot(${slot})`)).join("")
      : iconButton("Place", "plus", `placeEntityFirstAvailable(${item.id})`, "primary");
    return `<div class="item-card${themeClass(item)}"${themeStyle(item)}>` +
      `<div class="item-head"><div><div class="item-name">${escapeHtml(item.name)}</div><div class="item-meta">${entityMeta(item)}${themePill(item)}</div></div>${active}</div>` +
      `<div class="actions">` +
      placeOrRemove +
      iconButton("Clone", "copy", `cloneEntity(${item.id})`) +
      iconButton("Rename", "edit", `renameRecord('entity',${item.id})`) +
      iconLink("Export", "download", `/api/entity/${item.id}.bin`) +
      iconButton("Delete", "trash", `deleteRecord('entity',${item.id})`, "danger") +
      `</div></div>`;
  }).join("") || `<div class="empty">No ${displayMode(currentMode)} collection items.</div>`;
}

function renderSlots() {
  const entities = library.entities || [];
  const activeSlots = activeSlotsForCurrentMode();
  const sortedEntities = [...entities].sort((left, right) => left.name.localeCompare(right.name));
  if (currentMode === "infinity") {
    const activeCount = infinityPortalSlots.filter(portal => activeSlots.some(item => Number(item.slot) === portal.slot)).length;
    $("slots").innerHTML = infinityPortalSlots.map(portal => {
      const active = activeSlots.find(item => Number(item.slot) === portal.slot);
      const entity = active && entities.find(item => item.id === active.entity_id);
      if (entity) return portalCard(portal.label, entity, portal.slot);
      const options = entityOptions(sortedEntities.filter(item =>
        portal.accepts(item) && !activeSlots.some(active => active.entity_id === item.id)
      ));
      return portalAddCard(portal.label, options, portal.slot);
    }).join("");
    return;
  }

  const visibleActiveSlots = activeSlots.filter(active => Number(active.slot) < skylandersPortalSlotCount);
  const activeCards = [...visibleActiveSlots]
    .sort((left, right) => Number(left.slot) - Number(right.slot))
    .map(active => {
      const entity = entities.find(item => item.id === active.entity_id);
      return entity ? portalCard(null, entity, Number(active.slot)) : "";
    })
    .join("");
  const availableEntities = sortedEntities.filter(item =>
    item.game === "skylanders" && !activeSlots.some(active => active.entity_id === item.id)
  );
  const addCard = firstEmptySlot(activeSlots) == null
    ? `<div class="portal-card portal-add"><div class="portal-name">${deviceName()} Full</div><div class="meta">Remove a toy before adding another.</div></div>`
    : portalAddCard("Add Toy", entityOptions(availableEntities), null);
  $("slots").innerHTML = activeCards + addCard;
}

function portalCard(label, entity, slot) {
  return `<div class="portal-card active${themeClass(entity)}"${themeStyle(entity)}>` +
    `${label ? `<div class="meta">${escapeHtml(label)}</div>` : ""}` +
    `<div class="portal-name">${escapeHtml(entity.name)}</div>` +
    `<div class="item-meta">${entityMeta(entity)}${themePill(entity)}</div>` +
    `<div class="actions">${iconButton("Remove", "minus", `removeSlot(${slot})`)}</div>` +
    `</div>`;
}

function portalAddCard(label, options, slot) {
  const id = slot == null ? "portalAddSelect" : `portalAddSelect${slot}`;
  const action = slot == null ? "placePortalAddSelect()" : `placePortalAddSelect(${slot})`;
  return `<div class="portal-card portal-add">` +
    `<div class="portal-name">${escapeHtml(label)}</div>` +
    `<div class="actions">` +
    `<select id="${id}">${options}</select>` +
    `<button class="icon-button primary" type="button" title="Place on ${deviceName()}" aria-label="Place on ${deviceName()}" onclick="${action}" ${options ? "" : "disabled"}>${icon("plus")}</button>` +
    `</div></div>`;
}

function entityOptions(entities) {
  return entities.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join("");
}

function firstEmptySlot(activeSlots) {
  for (let slot = 0; slot < skylandersPortalSlotCount; slot++) {
    if (!activeSlots.some(item => Number(item.slot) === slot)) return slot;
  }
  return null;
}

function firstAvailableSlotForEntity(entity) {
  const activeSlots = activeSlotsForCurrentMode();
  if (currentMode === "infinity") {
    if (entity.game !== "infinity") return null;
    const portal = infinityPortalSlots.find(portal =>
      portal.accepts(entity) && !activeSlots.some(item => Number(item.slot) === portal.slot)
    );
    return portal ? portal.slot : null;
  }
  if (entity.game !== "skylanders") return null;
  return firstEmptySlot(activeSlots);
}

function entityMeta(item) {
  const toy = item.figure || item.toy || toyIdentifier(item);
  const details = [toy, readableKind(item.kind)];
  if (item.image_len) details.push(`${item.image_len} bytes`);
  return details.map(escapeHtml).join(" / ");
}

function themePill(item) {
  if (!themeColor(item.theme) || !item.theme_label || item.theme_label === "Unknown") return "";
  return `<span class="theme-pill">${escapeHtml(item.theme_label)}</span>`;
}

function themeClass(item) {
  return themeColor(item.theme) ? " theme-card" : "";
}

function themeStyle(item) {
  const color = themeColor(item.theme);
  return color ? ` style="--theme-color:${color}"` : "";
}

function themeColor(theme) {
  switch (themeKey(theme)) {
    case "air": return "#7aa7c7";
    case "earth": return "#8a6a3e";
    case "fire": return "#d44728";
    case "water": return "#2676bd";
    case "magic": return "#8a4dd8";
    case "tech": return "#c89318";
    case "life": return "#2f8f46";
    case "undead": return "#65717c";
    case "light": return "#d2aa2c";
    case "dark": return "#5c4f7d";
    case "the-incredibles": return "#d23f2f";
    case "monsters-university": return "#1f9b8a";
    case "pirates-of-the-caribbean": return "#7b5b35";
    case "cars": return "#c7372f";
    case "toy-story": return "#2b75bd";
    case "the-lone-ranger": return "#806445";
    case "frozen": return "#4f9bd8";
    case "marvel": return "#c93434";
    case "star-wars": return "#8e7a32";
    case "inside-out": return "#b54aa0";
    case "zootopia": return "#6b8f3f";
    case "finding-dory": return "#2384b8";
    default: return "";
  }
}

function themeKey(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function toyIdentifier(item) {
  if (item.character_id != null) return `ID ${item.character_id}`;
  if (item.figure_number != null) return `ID ${item.figure_number}`;
  return "Unknown toy";
}

function readableKind(kind) {
  return String(kind || "unknown").replace(/-/g, " ");
}

function storagePercent(used, capacity) {
  if (!capacity) return "0%";
  return `${((used / capacity) * 100).toFixed(1)}%`;
}

function containsText(value, search) {
  return String(value).toLowerCase().includes(search.toLowerCase());
}

async function fileHex(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  let out = "";
  for (const byte of bytes) out += byte.toString(16).padStart(2, "0");
  return out;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

async function createFromCatalog() {
  const item = selectedCatalogToy();
  if (!item) {
    say("Catalog toy is no longer available.");
    return;
  }
  const name = $("catalogName").value.trim() || suggestedNickname(item);
  try {
    say(await api("/api/entity/create-from-catalog", {
      method:"POST",
      body:`game=${enc($("catalogGame").value)}&catalog_index=${item.index}&name=${enc(name)}`
    }));
    $("catalogName").value = "";
    showTab("play");
    await refreshAll();
  } catch (error) {
    say(error.message);
  }
}

$("catalogKind").addEventListener("change", () => loadCatalog().catch(error => say(error.message)));
$("catalogGame").addEventListener("change", () => {
  updateCatalogKindOptions();
  loadCatalog().catch(error => say(error.message));
});
$("catalogSearch").addEventListener("input", () => {
  clearTimeout(catalogTimer);
  catalogTimer = setTimeout(() => loadCatalog().catch(error => say(error.message)), 250);
});
$("catalogSelect").addEventListener("change", updateCatalogNicknameHint);
$("collectionSearch").addEventListener("input", () => {
  clearTimeout(collectionTimer);
  collectionTimer = setTimeout(renderEntities, 120);
});

$("entityForm").addEventListener("submit", event => {
  event.preventDefault();
  createFromCatalog();
});

$("uploadEntityForm").addEventListener("submit", async event => {
  event.preventDefault();
  const form = event.target;
  const file = form.elements.file.files[0];
  if (!file) {
    say("Choose a binary file to import.");
    return;
  }
  if (form.elements.game.value === "infinity" && file.size !== 320) {
    say(`Disney Infinity imports must be exactly 320 bytes; selected file is ${file.size} bytes.`);
    return;
  }
  try {
    say(`Uploading ${file.name} (${file.size} bytes)...`);
    const imageHex = await fileHex(file);
    const body = `game=${enc(form.elements.game.value)}&name=${enc(form.elements.name.value)}&image_hex=${imageHex}`;
    say(await api("/api/entity/upload", {method:"POST", body}));
    form.reset();
    showTab("play");
    await refreshAll();
  } catch (error) {
    say(error.message);
  }
});

async function post(path, params = "") {
  const result = await api(path, {method:"POST", body:params});
  say(result);
  await refreshAll();
}

async function placeEntityInSlot(id, slot) {
  const index = Number(slot);
  const limit = currentMode === "infinity" ? infinityPortalSlots.length : skylandersPortalSlotCount;
  if (!Number.isInteger(index) || index < 0 || index >= limit) {
    say(`${deviceName()} target is invalid`);
    return;
  }
  await post("/api/entity/select", `id=${id}&slot=${index}`);
}

async function placeEntityFirstAvailable(id) {
  const entity = (library.entities || []).find(item => item.id === id);
  const slot = entity ? firstAvailableSlotForEntity(entity) : null;
  if (slot == null) {
    say(`No compatible ${deviceName()} position is available.`);
    return;
  }
  await placeEntityInSlot(id, slot);
}

async function placePortalAddSelect(slot = null) {
  const select = slot == null ? $("portalAddSelect") : $(`portalAddSelect${slot}`);
  if (!select || !select.value) return;
  const id = Number(select.value);
  if (!Number.isInteger(id)) return;
  if (slot == null) await placeEntityFirstAvailable(id);
  else await placeEntityInSlot(id, slot);
}

async function removeSlot(slot) {
  await post("/api/entity/clear-active", `slot=${slot}`);
}

async function clearActive() {
  await post("/api/entity/clear-active");
}

async function compactStorage() {
  if (confirm("Compact storage now?")) await post("/api/storage/compact");
}

async function cloneEntity(id) {
  const name = prompt("Clone name");
  if (name) await post("/api/entity/clone", `source_id=${id}&name=${enc(name)}`);
}

async function renameRecord(kind, id) {
  const name = prompt("New name");
  if (name) await post(`/api/${kind}/rename`, `id=${id}&name=${enc(name)}`);
}

async function deleteRecord(kind, id) {
  if (confirm(`Delete item #${id}?`)) await post(`/api/${kind}/delete`, `id=${id}`);
}

updateCatalogKindOptions();
refreshAll();
</script>
</body>
</html>
